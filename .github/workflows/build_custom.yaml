name: app-build-action-custom

on:
  workflow_dispatch: # 仅保留手动触发

jobs:
  # 打包Windows
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      # 签出代码（获取完整历史和标签）
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设为0才能获取tags

      # 获取最新的 dev_v* 标签并切换
      - name: Fetch latest dev_v* tag
        shell: bash
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l "dev_v*" --sort=-creatordate | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "❌ 未找到任何 dev_v* 标签！"
            exit 1
          fi
          echo "✅ 找到最新标签: $LATEST_TAG"
          git checkout "$LATEST_TAG"
          echo "TAG_NAME=$LATEST_TAG" >> $GITHUB_ENV

      # 设置Flutter环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Windows ZIP\MSIX
      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean
      # 上传Windows至Artifacts
      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip
      #完成
      - run: 'echo "🍏 Windows job''s status is ${{ job.status }}. Built tag: ${{ env.TAG_NAME }}"'

  # 打包TV
  build-tv:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 签出代码（获取完整历史和标签）
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设为0才能获取tags

      # 获取最新的 dev_tv_v* 标签并切换
      - name: Fetch latest dev_tv_v* tag
        shell: bash
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l "dev_tv_v*" --sort=-creatordate | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "❌ 未找到任何 dev_tv_v* 标签！"
            exit 1
          fi
          echo "✅ 找到最新标签: $LATEST_TAG"
          git checkout "$LATEST_TAG"
          echo "TAG_NAME=$LATEST_TAG" >> $GITHUB_ENV

      #APK签名设置
      - name: Download Android keystore
        id: android_tv_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Create key.properties
        run: |
          echo "storeFile=${{ steps.android_tv_keystore.outputs.filePath }}" > simple_live_tv_app/android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> simple_live_tv_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> simple_live_tv_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> simple_live_tv_app/android/key.properties

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      #设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      #更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      #打包APK
      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      #上传APK至Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
      #完成
      - run: 'echo "🍏 TV job''s status is ${{ job.status }}. Built tag: ${{ env.TAG_NAME }}"'
